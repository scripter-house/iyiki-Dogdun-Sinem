<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>İyi Ki Doğdun ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial, sans-serif;
    touch-action:manipulation;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Açılış ekranı */
#giftScreen{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top,#3a001f,#000 60%);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:100;
    overflow:hidden;
    transition:1.5s;
}

/* Glow */
.glow{
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:rgba(255,0,120,0.15);
    filter:blur(120px);
    animation:glowPulse 4s infinite ease-in-out;
}

@keyframes glowPulse{
    0%{
        transform:scale(1);
        opacity:.5;
    }
    50%{
        transform:scale(1.4);
        opacity:1;
    }
    100%{
        transform:scale(1);
        opacity:.5;
    }
}

/* Hediye kutusu */
.gift-box{
    position:relative;
    width:170px;
    height:170px;
    cursor:pointer;
    z-index:5;
    transition:.3s;
    animation:floatGift 2.5s infinite ease-in-out;
}

.gift-box:active{
    transform:scale(.95);
}

@keyframes floatGift{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-12px);
    }
    100%{
        transform:translateY(0px);
    }
}

.box{
    width:100%;
    height:100%;
    border-radius:22px;
    position:relative;
    overflow:hidden;

    background:
        linear-gradient(135deg,#ff006e,#ff4d9d);

    box-shadow:
        0 0 20px rgba(255,0,100,.7),
        0 0 70px rgba(255,0,100,.4);
}

.ribbon-v,
.ribbon-h{
    position:absolute;
    background:white;
}

.ribbon-v{
    width:26px;
    height:100%;
    left:50%;
    transform:translateX(-50%);
}

.ribbon-h{
    width:100%;
    height:26px;
    top:50%;
    transform:translateY(-50%);
}

.lid{
    position:absolute;
    width:190px;
    height:42px;
    background:#ff5ca8;
    left:-10px;
    top:-18px;
    border-radius:18px;
    z-index:10;
    transition:1s;
    box-shadow:0 12px 20px rgba(0,0,0,.4);
}

.gift-text{
    margin-top:40px;
    color:white;
    font-size:26px;
    text-align:center;
    z-index:5;
    animation:textFade 2s infinite;
    padding:0 20px;
}

@keyframes textFade{
    0%,100%{
        opacity:1;
    }
    50%{
        opacity:.5;
    }
}

/* Particles */
.particle{
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    pointer-events:none;
    z-index:999;
    animation:explode 1.4s forwards;
}

@keyframes explode{
    0%{
        transform:translate(0,0) scale(1);
        opacity:1;
    }

    100%{
        transform:
            translate(var(--x),var(--y))
            scale(0);

        opacity:0;
    }
}

/* Canvas */
canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    display:none;
    z-index:1;
}

/* Yazı */
#message{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    z-index:5;
    padding:20px;
    pointer-events:none;
}

#message h1{
    color:white;
    font-size:clamp(36px,9vw,90px);

    text-shadow:
        0 0 10px #ff006e,
        0 0 30px #ff006e,
        0 0 60px #ff006e;

    animation:heartBeat 1.5s infinite;
}

#message p{
    margin-top:20px;
    color:#ffd1e3;
    font-size:clamp(16px,4vw,28px);
    line-height:1.6;
    max-width:700px;
}

@keyframes heartBeat{
    0%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.05);
    }
    100%{
        transform:scale(1);
    }
}

/* Mobil */
@media(max-width:768px){

    .gift-box{
        width:120px;
        height:120px;
    }

    .lid{
        width:140px;
        height:34px;
    }

    .gift-text{
        font-size:18px;
    }

    .glow{
        width:280px;
        height:280px;
    }

    #message p{
        padding:0 10px;
    }
}

</style>
</head>
<body>

<div id="giftScreen">

    <div class="glow"></div>

    <div class="gift-box" id="giftBox">

        <div class="lid" id="lid"></div>

        <div class="box">
            <div class="ribbon-v"></div>
            <div class="ribbon-h"></div>
        </div>

    </div>

    <div class="gift-text">
        Sinem, kutuyu açmama yardım et. İyi kapatmışlar, açılmıyor
    </div>

</div>

<canvas id="heart"></canvas>

<div id="message">
    <h1>İyi Ki Doğdun ❤️</h1>

    <p>
        Hayatında hep mutluluk, huzur ve güzel anılar olsun...<br>
        İyi ki varsın 🌹
    </p>
</div>

<!-- Müzik -->
<iframe
    id="music"
    width="0"
    height="0"
    frameborder="0"
    allow="autoplay">
</iframe>

<script>

const giftBox = document.getElementById("giftBox");
const giftScreen = document.getElementById("giftScreen");
const lid = document.getElementById("lid");
const canvas = document.getElementById("heart");
const message = document.getElementById("message");
const music = document.getElementById("music");

let opened = false;

giftBox.addEventListener("click", () => {

    if(opened) return;
    opened = true;

    // Kutu kapağı animasyonu
    lid.style.transform =
        "translateY(-140px) rotate(-25deg)";

    lid.style.opacity = "0";

    // Şarkı embed linkiyle 1:30'dan (90. saniye) itibaren otomatik başlar
    music.src =
    "https://www.youtube.com/embed/3PFrAFQZHug?autoplay=1&start=90";

    // Patlama efekti
    createExplosion();

    // Ekran shake efekti
    document.body.animate([
        { transform: 'translate(0px,0px)' },
        { transform: 'translate(-5px,5px)' },
        { transform: 'translate(5px,-5px)' },
        { transform: 'translate(0px,0px)' }
    ],{
        duration:400
    });

    // Fade geçiş
    setTimeout(() => {

        giftScreen.style.opacity = "0";

        setTimeout(() => {

            giftScreen.style.display = "none";

            canvas.style.display = "block";

            message.style.display = "flex";

            initHeart();

        },1500);

    },1200);

});

/* Patlama */
function createExplosion(){

    const colors = [
        "#ff006e",
        "#ff4d9d",
        "#ffffff",
        "#ffd166",
        "#ff85c2"
    ];

    const particleCount =
        window.innerWidth < 768 ? 60 : 100;

    for(let i=0;i<particleCount;i++){

        const particle =
            document.createElement("div");

        particle.classList.add("particle");

        particle.style.background =
            colors[Math.floor(Math.random()*colors.length)];

        particle.style.left = "50%";
        particle.style.top = "50%";

        const x =
            (Math.random()-0.5) *
            (window.innerWidth < 768 ? 500 : 900)
            + "px";

        const y =
            (Math.random()-0.5) *
            (window.innerHeight < 768 ? 500 : 900)
            + "px";

        particle.style.setProperty("--x",x);
        particle.style.setProperty("--y",y);

        document.body.appendChild(particle);

        setTimeout(() => {
            particle.remove();
        },1400);
    }
}

/* Kalp Animasyonu */
function initHeart(){

window.requestAnimationFrame =
window.__requestAnimationFrame ||
window.requestAnimationFrame ||
window.webkitRequestAnimationFrame ||
window.mozRequestAnimationFrame ||
window.oRequestAnimationFrame ||
window.msRequestAnimationFrame ||
(function () {
    return function (callback, element) {
        var lastTime = element.__lastTime;

        if (lastTime === undefined) {
            lastTime = 0;
        }

        var currTime = Date.now();

        var timeToCall =
            Math.max(1, 33 - (currTime - lastTime));

        window.setTimeout(callback, timeToCall);

        element.__lastTime =
            currTime + timeToCall;
    };
})();

window.isDevice =
(/android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(
((navigator.userAgent ||
navigator.vendor ||
window.opera)).toLowerCase()));

var mobile = window.isDevice;

var koef = mobile ? 0.5 : 1;

var canvas =
document.getElementById('heart');

var ctx =
canvas.getContext('2d');

var width =
canvas.width =
koef * innerWidth;

var height =
canvas.height =
koef * innerHeight;

var rand = Math.random;

ctx.fillStyle = "rgba(0,0,0,1)";
ctx.fillRect(0, 0, width, height);

var heartPosition = function (rad) {

    return [
        Math.pow(Math.sin(rad), 3),

        -(15 * Math.cos(rad)
        - 5 * Math.cos(2 * rad)
        - 2 * Math.cos(3 * rad)
        - Math.cos(4 * rad))
    ];
};

var scaleAndTranslate =
function (pos, sx, sy, dx, dy) {

    return [
        dx + pos[0] * sx,
        dy + pos[1] * sy
    ];
};

window.addEventListener('resize', function () {

    width = canvas.width =
        koef * innerWidth;

    height = canvas.height =
        koef * innerHeight;

    ctx.fillStyle =
        "rgba(0,0,0,1)";

    ctx.fillRect(0, 0, width, height);
});

var traceCount = mobile ? 20 : 50;

var pointsOrigin = [];

var i;

var dr = mobile ? 0.3 : 0.1;

for (
    i = 0;
    i < Math.PI * 2;
    i += dr
)

pointsOrigin.push(
    scaleAndTranslate(
        heartPosition(i),
        210,
        13,
        0,
        0
    )
);

for (
    i = 0;
    i < Math.PI * 2;
    i += dr
)

pointsOrigin.push(
    scaleAndTranslate(
        heartPosition(i),
        150,
        9,
        0,
        0
    )
);

for (
    i = 0;
    i < Math.PI * 2;
    i += dr
)

pointsOrigin.push(
    scaleAndTranslate(
        heartPosition(i),
        90,
        5,
        0,
        0
    )
);

var heartPointsCount =
    pointsOrigin.length;

var targetPoints = [];

var pulse =
function (kx, ky) {

    for (
        i = 0;
        i < pointsOrigin.length;
        i++
    ) {

        targetPoints[i] = [];

        targetPoints[i][0] =
            kx * pointsOrigin[i][0]
            + width / 2;

        targetPoints[i][1] =
            ky * pointsOrigin[i][1]
            + height / 2;
    }
};

var e = [];

for (
    i = 0;
    i < heartPointsCount;
    i++
) {

    var x = rand() * width;
    var y = rand() * height;

    e[i] = {
        vx: 0,
        vy: 0,
        R: 2,
        speed: rand() + 5,
        q: ~~(rand() * heartPointsCount),
        D: 2 * (i % 2) - 1,
        force: 0.2 * rand() + 0.7,

        f:
            "hsla(340,"
            + ~~(40 * rand() + 60)
            + "%,"
            + ~~(60 * rand() + 20)
            + "%,.3)",

        trace: []
    };

    for (
        var k = 0;
        k < traceCount;
        k++
    )

    e[i].trace[k] = {
        x: x,
        y: y
    };
}

var config = {
    traceK: 0.4,
    timeDelta: 0.01
};

var time = 0;

var loop = function () {

    var n = -Math.cos(time);

    pulse(
        (1 + n) * .5,
        (1 + n) * .5
    );

    time += (
        (
            Math.sin(time)
        ) < 0 ? 9 :
        (n > 0.8) ? .2 : 1
    ) * config.timeDelta;

    ctx.fillStyle =
        "rgba(0,0,0,.1)";

    ctx.fillRect(
        0,
        0,
        width,
        height
    );

    for (
        i = e.length;
        i--;
    ) {

        var u = e[i];

        var q =
            targetPoints[u.q];

        var dx =
            u.trace[0].x - q[0];

        var dy =
            u.trace[0].y - q[1];

        var length =
            Math.sqrt(
                dx * dx + dy * dy
            );

        if (10 > length) {

            if (0.95 < rand()) {

                u.q =
                ~~(
                    rand()
                    * heartPointsCount
                );

            } else {

                if (0.99 < rand()) {
                    u.D *= -1;
                }

                u.q += u.D;

                u.q %= heartPointsCount;

                if (0 > u.q) {
                    u.q += heartPointsCount;
                }
            }
        }

        u.vx +=
            -dx / length * u.speed;

        u.vy +=
            -dy / length * u.speed;

        u.trace[0].x += u.vx;
        u.trace[0].y += u.vy;

        u.vx *= u.force;
        u.vy *= u.force;

        for (
            k = 0;
            k < u.trace.length - 1;
        ) {

            var T = u.trace[k];
            var N = u.trace[++k];

            N.x -=
                config.traceK
                * (N.x - T.x);

            N.y -=
                config.traceK
                * (N.y - T.y);
        }

        ctx.fillStyle = u.f;

        for (
            k = 0;
            k < u.trace.length;
            k++
        ) {

            ctx.fillRect(
                u.trace[k].x,
                u.trace[k].y,
                1,
                1
            );
        }
    }

    window.requestAnimationFrame(
        loop,
        canvas
    );
};

loop();

}

</script>
</body>
</html>
